<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>封面预览</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #000;
    }

    /* —— 16:9 科幻电影封面 —— */
    .poster {
      position: relative;
      width: 1280px;
      height: 720px;
      background: #000;
      overflow: hidden;
    }

    /* —— 原图（科幻冷色调） —— */
    .poster-bg {
      position: absolute;
      inset: 0;
      background-image: url('/images/cover.png');
      background-size: cover;
      background-position: center;
      filter:
        brightness(0.7)
        saturate(1.3)
        contrast(1.1)
        sepia(0.05)
        hue-rotate(-5deg);
    }

    /* —— 暗角（增加电影感） —— */
    .poster-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
    }

    /* —— 科幻蓝紫调色叠加 —— */
    .color-grade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(30,60,120,0.08) 0%, transparent 40%, rgba(80,20,120,0.06) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* —— 上下黑边（遮幅） —— */
    .letterbox-top, .letterbox-bottom {
      position: absolute;
      left: 0; right: 0;
      height: 4px;
      background: #000;
      z-index: 5;
    }
    .letterbox-top { top: 0; }
    .letterbox-bottom { bottom: 0; }

    @media (max-width: 1300px) {
      .poster { transform: scale(0.5); transform-origin: top center; }
      body { height: 360px; }
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="poster-bg"></div>
    <div class="color-grade"></div>
    <div class="letterbox-top"></div>
    <div class="letterbox-bottom"></div>
  </div>
</body>
</html>
